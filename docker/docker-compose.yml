version: '3.9'

# DevServer v2
# Usage:
#   cd docker && cp ../.env.example .env   # fill in credentials
#   docker compose up -d --build
#
# For Max subscription (Claude OAuth): mount your host ~/.claude directory.
# Uncomment the claude_auth lines in the worker service below.
#
# For API subscription: set ANTHROPIC_API_KEY in .env — nothing else needed.

services:

  # ── PostgreSQL 17 + pgvector ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: devserver-postgres
    environment:
      # devserver is created as superuser by Docker (required for CREATE EXTENSION vector).
      # The init SQL files' CREATE USER/DATABASE lines are no-ops since they already exist.
      POSTGRES_USER:     devserver
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme}
      POSTGRES_DB:       devserver
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # All migration files run automatically on first init (as postgres superuser)
      - ../database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${PGPORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devserver -d devserver"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── DevServer Web (Next.js + queue producer + WebSocket) ─────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: devserver-web
    environment:
      # Database — connects via service name
      DATABASE_URL: postgresql://devserver:${PGPASSWORD:-changeme}@postgres:5432/devserver
      # Worker — internal service URL (not localhost)
      WORKER_URL: http://worker:8000
      # Deploy mode for versioning
      DEPLOY_MODE: docker
      # Public URLs for browser clients
      NEXT_PUBLIC_WS_URL:  ${NEXT_PUBLIC_WS_URL:-ws://localhost:3000/api/ws}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      worker:
        condition: service_healthy
    restart: unless-stopped

  # ── DevServer Worker (Python FastAPI + PgQueuer consumer + Claude CLI) ───
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: devserver-worker
    environment:
      # Database — asyncpg driver, connects via service name
      DATABASE_URL: postgresql+asyncpg://devserver:${PGPASSWORD:-changeme}@postgres:5432/devserver
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID:   ${TELEGRAM_CHAT_ID}
      # Claude — API mode: set key below. Max mode: leave empty + uncomment claude_auth volume.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_BIN: claude
      # Paths inside container
      DEVSERVER_ROOT: /app
      WORKTREE_DIR:   /app/worktrees
      LOG_DIR:        /app/logs/tasks
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Persistent worktrees: bare repos + checked-out branches survive restarts
      - worktrees:/app/worktrees
      - worker_logs:/app/logs
      # ── Max subscription (Claude OAuth) ──────────────────────────────────
      # Uncomment to use Claude Max instead of API key.
      # Requires `claude login` to have been run on the HOST machine first.
      # - ${HOME}/.claude:/root/.claude:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  # Worktrees: bare repos + git worktrees for all coding tasks.
  # Stored in a named volume so clones survive container rebuilds.
  worktrees:
  worker_logs:
